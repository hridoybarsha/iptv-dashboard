<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SUPER IPTV Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111827;
color:#fff;
}

header{
background:#1f2937;
padding:15px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:20px;
}

.card{
padding:25px;
border-radius:12px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.blue{background:#2563eb;}
.green{background:#16a34a;}
.red{background:#dc2626;}
.orange{background:#f59e0b;}

.menu{
padding:20px;
}

.menu a{
display:block;
background:#374151;
color:white;
text-decoration:none;
padding:15px;
margin-bottom:10px;
border-radius:8px;
}

.menu a:hover{
background:#4b5563;
}

</style>

</head>

<body>

<header>
📺 SUPER IPTV DASHBOARD
</header>

<div class="container">

<div class="card blue">
Total Users<br><br>0
</div>

<div class="card green">
Active Users<br><br>0
</div>

<div class="card red">
Expired Users<br><br>0
</div>

<div class="card orange">
Revenue<br><br>₹0
</div>

</div>

<div class="menu">

<a href="users.html">👥 Manage Users</a>

<a href="payments.html">💳 Payments</a>

<a href="settings.html">⚙ Settings</a>

<a href="index.html">🚪 Logout</a>

</div>

</body>
</html>
