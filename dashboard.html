<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUPER IPTV Dashboard</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:#fff;
display:flex;
}

.sidebar{
width:240px;
height:100vh;
background:#111827;
padding:20px;
}

.sidebar h2{
text-align:center;
margin-bottom:30px;
color:#22c55e;
}

.sidebar a{
display:block;
padding:14px;
margin:10px 0;
background:#1f2937;
color:#fff;
text-decoration:none;
border-radius:8px;
}

.sidebar a:hover{
background:#22c55e;
}

.main{
flex:1;
padding:20px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:#1e293b;
padding:25px;
border-radius:12px;
text-align:center;
}

.card h3{
font-size:18px;
margin-bottom:10px;
}

.card p{
font-size:30px;
font-weight:bold;
}

table{
width:100%;
margin-top:30px;
border-collapse:collapse;
}

th,td{
padding:12px;
border:1px solid #334155;
text-align:center;
}

th{
background:#2563eb;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>📺 SUPER IPTV</h2>

<a href="dashboard.html">🏠 Dashboard</a>
<a href="users.html">👥 Users</a>
<a href="#">💳 Payments</a>
<a href="#">📊 Reports</a>
<a href="#">⚙ Settings</a>
<a href="index.html">🚪 Logout</a>
</div>

<div class="main">

<h1>Dashboard</h1>

<div class="cards">

<div class="card">
<h3>Total Users</h3>
<p>0</p>
</div>

<div class="card">
<h3>Active Users</h3>
<p>0</p>
</div>

<div class="card">
<h3>Expired Users</h3>
<p>0</p>
</div>

<div class="card">
<h3>Revenue</h3>
<p>₹0</p>
</div>

</div>

<table>

<tr>
<th>User</th>
<th>Plan</th>
<th>Status</th>
<th>Expiry</th>
</tr>

<tr>
<td>Demo User</td>
<td>1 Month</td>
<td>Active</td>
<td>20 Aug 2026</td>
</tr>

</table>

</div>

</body>
</html>
