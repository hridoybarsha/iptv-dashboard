<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SUPER IPTV - Users</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#0f172a;
color:#fff;
display:flex;
min-height:100vh;
}

.sidebar{

width:260px;
background:#111827;
padding:25px;

}

.logo{

font-size:24px;
font-weight:700;
color:#22c55e;
margin-bottom:40px;

}

.sidebar a{

display:block;
padding:15px;
margin-bottom:12px;
text-decoration:none;
color:white;
background:#1f2937;
border-radius:10px;
transition:.3s;

}

.sidebar a:hover{

background:#22c55e;

}

.main{

flex:1;
padding:30px;

}

.top{

display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;

}

.top h1{

font-size:30px;

}

.search{

width:320px;
padding:12px;
border:none;
border-radius:8px;

}

.cards{

display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:25px;

}

.card{

background:#1e293b;
padding:20px;
border-radius:12px;

}

.card h3{

font-size:16px;
color:#94a3b8;

}

.card h2{

margin-top:12px;
font-size:28px;

}

.form{

background:#1e293b;
padding:25px;
border-radius:12px;
margin-bottom:25px;

}

.form h2{

margin-bottom:15px;

}

.form input,
.form select{

width:100%;
padding:13px;
margin:8px 0;
border:none;
border-radius:8px;

}

.addBtn{

width:100%;
padding:14px;
background:#22c55e;
color:white;
border:none;
border-radius:8px;
font-size:17px;
cursor:pointer;

}

table{

width:100%;
border-collapse:collapse;

}

th{

background:#2563eb;
padding:15px;

}

td{

background:#1e293b;
padding:15px;
text-align:center;

}

.action{

padding:8px 14px;
border:none;
border-radius:6px;
cursor:pointer;
color:white;

}

.edit{

background:#f59e0b;

}

.delete{

background:#ef4444;

}

.whatsapp{

background:#16a34a;

}

.call{

background:#0284c7;

}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">
📺 SUPER IPTV
</div>

<a href="dashboard.html">🏠 Dashboard</a>

<a href="users.html">👥 Users</a>

<a href="payments.html">💳 Payments</a>

<a href="settings.html">⚙ Settings</a>

<a href="index.html">🚪 Logout</a>

</div>

<div class="main">

<div class="top">

<h1>Users Management</h1>

<input class="search"
placeholder="Search User...">

</div>

<div class="cards">

<div class="card">
<h3>Total Users</h3>
<h2 id="totalUsers">0</h2>
</div>

<div class="card">
<h3>Active Users</h3>
<h2>0</h2>
</div>

<div class="card">
<h3>Expired</h3>
<h2>0</h2>
</div>

<div class="card">
<h3>Revenue</h3>
<h2>₹0</h2>
</div>

<div class="form">

<h2>Add New User</h2>

<input id="phone" placeholder="Phone Number">

<input id="username" placeholder="Username">

<input id="password" placeholder="Password">

<input id="portal" placeholder="Portal URL">

<select id="plan">

<option>1 Month</option>
<option>3 Months</option>
<option>6 Months</option>
<option>12 Months</option>

</select>

<button class="addBtn"
onclick="saveUser()">

Add User

</button>

</div>

<table>

<thead>

<tr>

<th>ID</th>

<th>Phone</th>

<th>User</th>

<th>Plan</th>

<th>Status</th>

<th>Action</th>

</tr>

</thead>

<tbody id="userTable">

</tbody>

</table>

<script src="users.js"></script>

</body>

</html>
