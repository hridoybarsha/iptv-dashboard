<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SUPER IPTV</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login{
width:350px;
background:#1e293b;
padding:30px;
border-radius:15px;
box-shadow:0 0 20px #000;
}

h1{
color:white;
text-align:center;
margin-bottom:25px;
}

input{
width:100%;
padding:14px;
margin:10px 0;
border:none;
border-radius:8px;
font-size:16px;
}

button{
width:100%;
padding:14px;
background:#22c55e;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}
</style>

</head>

<body>

<div class="login">

<h1>SUPER IPTV</h1>

<input id="user" placeholder="Username">

<input id="pass" type="password" placeholder="Password">

<button onclick="login()">LOGIN</button>

</div>

<script>

function login(){

let u=document.getElementById("user").value;

let p=document.getElementById("pass").value;

if(u=="admin" && p=="123456"){

location.href="dashboard.html";

}else{

alert("Wrong Username or Password");

}

}

</script>

</body>
</html>
